version: "3.8"

services:
  database:
    image: "postgres"
    container_name: postgres
    restart: no
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - manutencoes-network

volumes:
  pgdata:
    driver: local

networks:
  manutencoes-network:
    driver: bridge
